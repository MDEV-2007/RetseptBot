{% extends "base.html" %}
{% block title %}Delete Patient{% endblock %}
{% block page_title %}Delete Patient{% endblock %}

{% block content %}
<div class="card form-card">
  <div class="card-body text-center">
    <div style="font-size:3rem;margin-bottom:1rem;">&#9888;</div>
    <h2>Delete "{{ object.full_name }}"?</h2>
    <p class="text-muted">This action cannot be undone. All related data will be preserved.</p>
    <form method="post" style="margin-top:1.5rem">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'patient_detail' object.pk %}" class="btn btn-outline">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
