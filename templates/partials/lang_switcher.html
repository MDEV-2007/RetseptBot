{% load i18n %}
<div class="lang-sw" id="langSw">
  <button class="lang-sw-btn" id="langSwBtn" type="button" aria-label="Language">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
    <span class="lang-sw-code">{{ LANGUAGE_CODE|upper }}</span>
  </button>
  <div class="lang-sw-drop" id="langSwDrop">
    <form action="{% url 'set_language' %}" method="post" id="langForm">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.get_full_path }}">
      <input type="hidden" name="language" id="langInput" value="">
      <button type="button" class="lang-opt {% if LANGUAGE_CODE == 'en' %}lang-opt--active{% endif %}" data-lang="en">
        <span class="lang-opt-flag">🇬🇧</span> EN
      </button>
      <button type="button" class="lang-opt {% if LANGUAGE_CODE == 'uz' %}lang-opt--active{% endif %}" data-lang="uz">
        <span class="lang-opt-flag">🇺🇿</span> UZ
      </button>
      <button type="button" class="lang-opt {% if LANGUAGE_CODE == 'ru' %}lang-opt--active{% endif %}" data-lang="ru">
        <span class="lang-opt-flag">🇷🇺</span> RU
      </button>
    </form>
  </div>
</div>
